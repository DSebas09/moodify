<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Moodify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5" style="max-width: 600px;">
  <h1 class="mb-4 fw-bold">Moodify</h1>

  <form method="POST">
    <div class="input-group mb-3">
      <input type="text" name="track_name" class="form-control"
             placeholder="Nombre de la canción..." required>
      <button class="btn btn-primary" type="submit">Clasificar</button>
    </div>
  </form>

  {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  {% if result %}
    <div class="card mt-3">
      <div class="card-body">
        <h5 class="card-title">{{ result.track_name }}</h5>
        <p class="text-muted mb-2">{{ result.artists }}</p>
        <h2 class="display-6 fw-bold">{{ result.mood | upper }}</h2>
        <hr>
        <ul class="list-unstyled">
          {% for key, val in result.features.items() %}
            <li><strong>{{ key }}:</strong> {{ val }}</li>
          {% endfor %}
        </ul>
      </div>
    </div>
  {% endif %}
</div>

</body>
</html>
